<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tropical Games</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:linear-gradient(180deg,#1a0a2e 0%,#2d1b4e 50%,#4a1a4e 100%);color:#fff;font-family:'Press Start 2P',monospace;image-rendering:pixelated}
  body{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;gap:32px}
  h1{font-size:18px;color:#ffd93d;text-shadow:2px 2px 0 #ff6b9d;line-height:1.6}
  .sub{font-size:9px;color:#c8b6ff;letter-spacing:2px}
  .games{display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px}
  a.card{display:block;background:#2d1640;border:2px solid #ff6b9d;color:#fff;padding:20px;text-decoration:none;font-size:11px;line-height:1.6;transition:transform 0.1s}
  a.card:hover,a.card:active{transform:translate(2px,2px);background:#3a1f55}
  .title{color:#ffd93d;font-size:13px;margin-bottom:8px}
  .desc{font-size:8px;color:#c8b6ff;line-height:1.8}
</style>
</head>
<body>
  <div>
    <div class="sub">TROPICAL DREAM CLUB</div>
    <h1>TROPICAL<br>GAMES</h1>
  </div>
  <div class="games">
    <a class="card" href="./smile-bomb/">
      <div class="title">▸ BLOCK RUSH</div>
      <div class="desc">- KINAKO MIX -<br>音と遊ぶブロック崩し<br><span style="color:#888;font-size:7px">v 0.17</span></div>
    </a>
    <a class="card" href="./sandbox/stem-switches.html" style="border-color:#5DCAA5">
      <div class="title" style="color:#5DCAA5">▸ STEM SWITCH UI</div>
      <div class="desc">8パターンサンプル<br><span style="color:#888;font-size:7px">sandbox v 0.12</span></div>
    </a>
  </div>
  <div style="font-size:7px;color:#666;letter-spacing:2px">SITE v 0.17</div>
</body>
</html>
